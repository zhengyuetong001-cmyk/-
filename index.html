<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>篮球临场战术分析台</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Basketball Tactical Desk</p>
          <h1>篮球临场战术分析台</h1>
        </div>
        <div class="status-cluster">
          <span id="sourceStatus" class="status-pill muted">未连接视频</span>
          <span id="recordStatus" class="status-pill muted">未录像</span>
          <span id="clipStatus" class="status-pill muted">自动片段待命</span>
          <span id="projectStatus" class="status-pill muted">未选择项目文件夹</span>
          <span id="eventStatus" class="status-pill">0 条记录</span>
        </div>
      </header>

      <nav class="page-tabs" aria-label="页面切换">
        <button class="active" type="button" data-page="live">临场打点</button>
        <button type="button" data-page="events">事件列表</button>
        <button type="button" data-page="clips">片段库</button>
        <button type="button" data-page="archive">归纳视图</button>
      </nav>

      <section class="workspace app-page active" data-page-panel="live">
        <section class="stage-panel" aria-label="视频区域">
          <div class="video-frame">
            <video id="liveVideo" autoplay muted playsinline controls></video>
            <div id="emptyState" class="empty-state">
              <strong>选择摄像机或导入视频</strong>
              <span>第一阶段会优先保存整场录像和事件记录</span>
            </div>
          </div>

          <div class="transport">
            <select id="deviceSelect" aria-label="选择视频设备">
              <option value="">正在读取视频设备...</option>
            </select>
            <button id="refreshDevices" type="button">刷新设备</button>
            <button id="connectCamera" class="primary-btn" type="button">连接摄像机</button>
            <label class="file-btn">
              导入视频
              <input id="fileInput" type="file" accept="video/*">
            </label>
            <button id="recordToggle" type="button" disabled>开始录像</button>
            <a id="downloadRecording" class="download-link disabled" href="#" download>下载整场录像</a>
          </div>
        </section>

        <aside class="control-rail" aria-label="临场控制台">
          <section class="control-section">
            <div class="section-heading">
              <h2>球员号码</h2>
              <span id="currentPlayer">未指定球员</span>
            </div>
            <div class="keyboard-player">
              <span id="keyboardTeam">主队</span>
              <strong id="playerBuffer">1-5 选择场上球员</strong>
              <small>Tab 切换主/客队 · 1-5 选场上球员 · N 改号码 · Enter 确认</small>
            </div>
            <div id="lineupSlots" class="lineup-slots" aria-label="场上快捷位"></div>
            <div class="team-columns">
              <div>
                <label class="input-label" for="homeNumbers">主队号码</label>
                <div class="input-row">
                  <input id="homeNumbers" type="text" value="0,1,3,5,7,10,11,23">
                  <button id="applyHome" type="button">应用</button>
                </div>
                <div id="homePlayers" class="player-grid" aria-label="主队球员"></div>
              </div>
              <div>
                <label class="input-label" for="awayNumbers">客队号码</label>
                <div class="input-row">
                  <input id="awayNumbers" type="text" value="2,4,6,8,12,15,24">
                  <button id="applyAway" type="button">应用</button>
                </div>
                <div id="awayPlayers" class="player-grid" aria-label="客队球员"></div>
              </div>
            </div>
            <button id="clearPlayer" type="button" class="ghost-btn">未指定球员</button>
          </section>

          <section class="control-section tag-section">
            <div class="section-heading">
              <h2>打点标记</h2>
              <span>← 正面 / → 问题 · QWERASD 打点</span>
            </div>
            <div id="resultToggle" class="result-toggle" aria-label="正面或问题"></div>
            <div id="tagGrid" class="tag-grid"></div>
          </section>

          <section class="control-section">
            <div class="section-heading">
              <h2>阶段</h2>
              <span id="timeReadout">00:00</span>
            </div>
            <select id="phaseSelect" aria-label="当前阶段">
              <option value="第1节">第1节</option>
              <option value="第2节">第2节</option>
              <option value="第3节">第3节</option>
              <option value="第4节">第4节</option>
              <option value="加时">加时</option>
              <option value="训练第1段">训练第1段</option>
              <option value="训练第2段">训练第2段</option>
              <option value="训练第3段">训练第3段</option>
            </select>
          </section>

          <section class="control-section">
            <div class="section-heading">
              <h2>最近 5 条</h2>
              <span>可快速修正</span>
            </div>
            <div id="recentList" class="recent-list compact-recent"></div>
          </section>
        </aside>
      </section>

      <section class="records-panel app-page" data-page-panel="events" aria-label="事件列表">
        <div class="records-head">
          <div>
            <p class="eyebrow">Live Log</p>
            <h2>事件列表</h2>
          </div>
          <div class="record-actions">
            <button id="chooseProjectFolder" type="button">选择项目文件夹</button>
            <button id="saveProjectFolder" type="button">保存到项目文件夹</button>
            <button id="undoLast" type="button">撤销最近一条</button>
            <button id="exportCsv" type="button">导出表格</button>
            <button id="exportProject" type="button">导出项目记录</button>
          </div>
        </div>

        <div class="event-wrap">
          <h3>全部事件</h3>
          <div id="eventTable" class="event-table"></div>
        </div>
      </section>

      <section class="records-panel app-page" data-page-panel="clips" aria-label="片段库">
        <div class="records-head">
          <div>
            <p class="eyebrow">Clips</p>
            <h2>片段库</h2>
          </div>
        </div>
        <div id="clipList" class="clip-list"></div>
      </section>

      <section class="records-panel app-page" data-page-panel="archive" aria-label="归纳视图">
        <div class="event-wrap no-border">
          <div class="archive-head">
            <h3>归纳视图</h3>
            <div class="archive-tabs">
              <button id="archiveByPlayer" type="button">按球员归纳</button>
              <button id="archiveByTag" type="button">按打点归纳</button>
            </div>
          </div>
          <div id="archiveList" class="archive-list"></div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
