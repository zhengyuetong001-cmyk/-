<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>临场篮球数据记录平台</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d252d;
      --muted: #607080;
      --line: #d9e1e8;
      --panel: #ffffff;
      --soft: #f4f7fa;
      --court: #f2c987;
      --court-line: #81552f;
      --make: #14845d;
      --miss: #c23b3b;
      --accent: #205b9f;
      --accent-2: #8d5f18;
      --shadow: 0 10px 30px rgba(31, 45, 61, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #eef3f7;
      overflow: hidden;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      min-height: 38px;
      border-radius: 6px;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease, color .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: #aab8c6;
    }

    button:active {
      transform: translateY(0);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .topbar {
      background: #172330;
      color: #fff;
      padding: 9px 14px;
      display: grid;
      grid-template-columns: minmax(190px, 1fr) auto auto;
      gap: 14px;
      align-items: center;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .18);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 800;
      white-space: nowrap;
    }

    .brand span {
      color: #b9c6d4;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      min-width: 330px;
    }

    .team-score {
      display: grid;
      grid-template-columns: minmax(72px, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .team-score.away {
      grid-template-columns: auto minmax(72px, 1fr);
      text-align: right;
    }

    .score {
      font-size: 28px;
      line-height: 1;
      font-weight: 900;
      min-width: 44px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .team-input {
      width: 100%;
      min-width: 0;
      border: 1px solid #3c4c5e;
      color: #fff;
      background: #223142;
      border-radius: 5px;
      padding: 7px 9px;
    }

    .period-box {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #dce6ef;
      white-space: nowrap;
    }

    .period-box select,
    .period-box input {
      border: 1px solid #3c4c5e;
      color: #fff;
      background: #223142;
      border-radius: 5px;
      padding: 7px 8px;
      min-height: 36px;
    }

    .clock {
      width: 76px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .view-tabs {
      display: flex;
      gap: 8px;
      padding: 8px 14px 0;
      background: #eef3f7;
    }

    .view-tab {
      min-width: 110px;
      padding: 0 14px;
      font-weight: 800;
    }

    .view-tab.active {
      background: #172330;
      border-color: #172330;
      color: #fff;
    }

    .main {
      display: grid;
      grid-template-columns: 285px minmax(420px, 1fr) 345px;
      grid-template-rows: minmax(0, 1fr);
      gap: 10px;
      height: calc(100vh - 106px);
      overflow: hidden;
      padding: 10px;
      min-height: 0;
    }

    .hidden {
      display: none !important;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-height: 0;
      overflow: hidden;
    }

    .panel-header {
      padding: 9px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fbfcfd;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }

    .side {
      position: relative;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      min-height: 0;
    }

    .team-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid var(--line);
    }

    .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 800;
    }

    .players {
      overflow: auto;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      align-content: start;
    }

    .player-btn {
      min-height: 46px;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
      background: var(--soft);
    }

    .player-name {
      display: block;
      font-size: 12px;
      line-height: 1.2;
      margin-top: 3px;
      font-weight: 700;
      color: inherit;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-btn.active {
      background: #172330;
      color: #fff;
      border-color: #172330;
    }

    .selected-strip {
      padding: 8px;
      background: #fbfcfd;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .selected-trigger {
      width: 100%;
      min-height: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      font-weight: 800;
      background: #f7fafc;
    }

    .selected-strip strong {
      color: var(--ink);
      font-size: 16px;
    }

    .roster-editor {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 128px;
      z-index: 10;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: grid;
      gap: 8px;
      box-shadow: var(--shadow);
    }

    .roster-editor.hidden {
      display: none !important;
    }

    .roster-editor label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .roster-editor textarea {
      width: 100%;
      min-height: 48px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      line-height: 1.4;
    }

    .court-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 0;
    }

    .mode-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mode-btn {
      padding: 0 12px;
      font-weight: 700;
    }

    .mode-btn[data-active="true"] {
      background: var(--accent-2);
      border-color: var(--accent-2);
      color: #fff;
    }

    .court-wrap {
      padding: 10px;
      min-height: 0;
      display: grid;
      overflow: hidden;
    }

    .court {
      position: relative;
      width: 100%;
      min-height: 0;
      height: 100%;
      aspect-ratio: 0.72 / 1;
      max-height: none;
      margin: auto;
      background: var(--court);
      border: 4px solid var(--court-line);
      border-radius: 8px;
      overflow: hidden;
      cursor: crosshair;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.25);
    }

    .court::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, transparent calc(100% - 2px), rgba(129,85,47,.95) calc(100% - 2px), rgba(129,85,47,.95) 100%),
        radial-gradient(circle at 50% 11%, transparent 0 12%, rgba(129,85,47,.95) 12.2% 12.9%, transparent 13.1%),
        radial-gradient(circle at 50% 11%, transparent 0 47%, rgba(129,85,47,.95) 47.2% 47.8%, transparent 48%),
        radial-gradient(circle at 50% 100%, transparent 0 14%, rgba(129,85,47,.95) 14.2% 14.8%, transparent 15%);
      pointer-events: none;
    }

    .paint {
      position: absolute;
      left: 31%;
      width: 38%;
      height: 22%;
      border: 3px solid var(--court-line);
      pointer-events: none;
    }

    .paint.left {
      top: -3px;
    }

    .paint.right {
      display: none;
    }

    .rim {
      position: absolute;
      left: calc(50% - 13px);
      width: 26px;
      height: 26px;
      border: 4px solid #a7402a;
      border-radius: 50%;
      background: rgba(255, 255, 255, .25);
      pointer-events: none;
    }

    .rim.left {
      top: 9%;
    }

    .rim.right {
      display: none;
    }

    .shot-dot {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid #fff;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      pointer-events: none;
    }

    .shot-dot.make {
      background: var(--make);
    }

    .shot-dot.miss {
      background: var(--miss);
    }

    .shot-dot.and-one {
      background: #7a3db8;
    }

    .shot-dot.draw-foul {
      background: #e07a2f;
    }

    .legend {
      padding: 0 10px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend b {
      color: var(--ink);
    }

    .period-map-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 0 10px 8px;
    }

    .period-map-btn {
      min-height: 32px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .period-map-btn.active {
      background: #172330;
      border-color: #172330;
      color: #fff;
    }

    .dot-sample {
      display: inline-block;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: -1px;
    }

    .make-sample {
      background: var(--make);
    }

    .miss-sample {
      background: var(--miss);
    }

    .and-one-sample {
      background: #7a3db8;
    }

    .draw-foul-sample {
      background: #e07a2f;
    }

    .actions {
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr);
      min-height: 0;
    }

    .event-grid {
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      border-bottom: 1px solid var(--line);
    }

    .event-btn {
      min-height: 43px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .event-btn.primary {
      background: #e7f0fb;
      border-color: #b8d1ec;
      color: #164f8d;
    }

    .event-btn.warn {
      background: #fff0ed;
      border-color: #f0c4ba;
      color: #9e3126;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .toolbar button {
      font-weight: 800;
    }

    .game-archive {
      display: grid;
      gap: 8px;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .archive-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .archive-row input,
    .archive-row select {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      color: var(--ink);
      background: #fff;
    }

    .danger {
      color: #9e3126;
      border-color: #e3b4ad;
    }

    .log {
      min-height: 0;
      overflow: auto;
      padding: 0;
    }

    .log-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid #edf1f5;
      align-items: center;
      font-size: 13px;
    }

    .log-time {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .log-main {
      min-width: 0;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #edf3f9;
      padding: 2px 8px;
      color: #365064;
      font-size: 12px;
      white-space: nowrap;
    }

    .stats {
      display: none;
      grid-column: 1 / -1;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .table-wrap {
      overflow: auto;
      max-height: 34vh;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      font-size: 13px;
    }

    th, td {
      padding: 8px 9px;
      border-bottom: 1px solid #edf1f5;
      text-align: center;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
      color: #425466;
      font-weight: 800;
    }

    td:first-child, th:first-child {
      text-align: left;
      font-weight: 800;
    }

    .summary-cards {
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 70px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 22px;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .metric.leader strong {
      font-size: 16px;
      line-height: 1.35;
    }

    .file-input {
      display: none;
    }

    .summary-page {
      padding: 14px;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .final-top {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .final-table-wrap {
      overflow: auto;
      max-height: calc(100vh - 235px);
    }

    .final-team-row td {
      background: #eef4fa;
      color: #193146;
      font-weight: 900;
    }

    .final-player-row.has-data td:first-child {
      color: #172330;
    }

    .efficiency-cell {
      min-width: 160px;
    }

    .efficiency-box {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      align-items: center;
    }

    .efficiency-value {
      font-size: 17px;
      font-weight: 900;
      color: #17324b;
      text-align: right;
    }

    .efficiency-track {
      height: 10px;
      border-radius: 999px;
      background: #e4eaf0;
      overflow: hidden;
    }

    .efficiency-bar {
      height: 100%;
      width: var(--eff-width);
      border-radius: inherit;
      background: linear-gradient(90deg, #2f7d69, #1d5f9f);
    }

    .efficiency-bar.negative {
      background: #c23b3b;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 24px;
      margin-right: 8px;
      border-radius: 999px;
      background: #edf3f9;
      color: #365064;
      font-size: 12px;
      font-weight: 900;
    }

    .rank-badge.top {
      background: #ffe8a8;
      color: #7a4b00;
    }

    @media (max-width: 980px) {
      .main {
        grid-template-columns: 230px minmax(420px, 1fr);
        height: auto;
        min-height: calc(100vh - 106px);
        overflow: visible;
      }

      .actions {
        grid-column: 1 / -1;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
      }

      .actions .panel-header {
        grid-column: 1 / -1;
      }

      .event-grid,
      .toolbar {
        border-right: 1px solid var(--line);
      }

      .log {
        grid-row: 2 / 4;
        grid-column: 2;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .scoreboard {
        min-width: 0;
        width: 100%;
      }

      .main {
        grid-template-columns: 1fr;
        padding: 10px;
        height: auto;
        overflow: visible;
      }

      .players {
        grid-template-columns: repeat(4, 1fr);
      }

      .court {
        min-height: 260px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .log {
        grid-column: auto;
        grid-row: auto;
        max-height: 320px;
      }

      .summary-cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>临场篮球数据记录平台</h1>
        <span>投篮分布 · 失误 · 前后场篮板 · 自定义球员名单</span>
      </div>
      <div class="scoreboard">
        <div class="team-score home">
          <input id="teamHomeName" class="team-input" value="主队" aria-label="主队名称">
          <div id="homeScore" class="score">0</div>
        </div>
        <strong>:</strong>
        <div class="team-score away">
          <div id="awayScore" class="score">0</div>
          <input id="teamAwayName" class="team-input" value="客队" aria-label="客队名称">
        </div>
      </div>
      <div class="period-box">
        <select id="period" aria-label="节次">
          <option>第1节</option>
          <option>第2节</option>
          <option>第3节</option>
          <option>第4节</option>
          <option>加时</option>
        </select>
        <input id="clock" class="clock" value="10:00" aria-label="比赛时间">
      </div>
    </header>

    <nav class="view-tabs" aria-label="页面切换">
      <button id="liveViewBtn" class="view-tab active" type="button">临场记录</button>
      <button id="summaryViewBtn" class="view-tab" type="button">球员汇总</button>
    </nav>

    <main id="livePage" class="main">
      <section class="panel side">
        <div class="panel-header">
          <h2 class="panel-title">球员选择</h2>
          <span id="activeTeamLabel" class="tag">主队</span>
        </div>
        <div class="team-toggle">
          <button id="homeToggle" class="toggle-btn active" type="button">主队</button>
          <button id="awayToggle" class="toggle-btn" type="button">客队</button>
        </div>
        <div class="selected-strip">
          <button id="selectedRecordBtn" class="selected-trigger" type="button">
            <span>当前记录</span>
            <strong id="selectedInfo">主队 #1</strong>
          </button>
        </div>
        <div id="rosterEditor" class="roster-editor hidden">
          <label for="rosterInput">当前球队名单，可用空格、换行或逗号分隔</label>
          <textarea id="rosterInput" aria-label="当前球队名单"></textarea>
          <button id="applyRosterBtn" type="button">更新当前球队名单</button>
        </div>
        <div id="players" class="players" aria-label="球员编号"></div>
      </section>

      <section class="panel court-panel">
        <div class="panel-header">
          <h2 class="panel-title">投篮分布</h2>
          <div class="mode-row" aria-label="投篮模式">
            <button class="mode-btn" data-shot="2M" data-active="true" type="button">2分进</button>
            <button class="mode-btn" data-shot="2A" type="button">2分失</button>
            <button class="mode-btn" data-shot="3M" type="button">3分进</button>
            <button class="mode-btn" data-shot="3A" type="button">3分失</button>
            <button class="mode-btn" data-shot="AND1" type="button">2+1</button>
            <button class="mode-btn" data-shot="DRAW_FOUL" type="button">造罚球</button>
          </div>
        </div>
        <div class="court-wrap">
          <div id="court" class="court" role="button" tabindex="0" aria-label="点击球场记录投篮位置">
            <div class="paint left"></div>
            <div class="paint right"></div>
            <div class="rim left"></div>
            <div class="rim right"></div>
          </div>
        </div>
        <div class="legend">
          <span><span class="dot-sample make-sample"></span>命中</span>
          <span><span class="dot-sample miss-sample"></span>未中</span>
          <span><span class="dot-sample and-one-sample"></span>2+1</span>
          <span><span class="dot-sample draw-foul-sample"></span>造罚球</span>
          <span id="courtPeriodInfo"><b>当前节投篮图：</b>第1节 · 0次投篮</span>
          <span><b>提示：</b>先选球员，再选投篮结果，点击球场位置。</span>

        <div id="periodMapTabs" class="period-map-tabs" aria-label="按节查看投篮图"></div>

      <section class="panel actions">
        <div class="panel-header">
          <h2 class="panel-title">快速事件</h2>
          <span id="eventCount" class="tag">0条</span>
        </div>
        <div class="event-grid">
          <button class="event-btn primary" data-event="AST" type="button">助攻</button>
          <button class="event-btn warn" data-event="TO" type="button">失误</button>
          <button class="event-btn primary" data-event="STL" type="button">抢断</button>
          <button class="event-btn primary" data-event="BLK" type="button">盖帽</button>
          <button class="event-btn primary" data-event="OREB" type="button">前场篮板</button>
          <button class="event-btn primary" data-event="DREB" type="button">后场篮板</button>
          <button class="event-btn" data-event="FTM" type="button">罚球进</button>

          <button id="loadBtn" type="button">读取</button>
          <button id="clearBtn" class="danger" type="button">清空</button>

          </div>
          <div class="archive-row">

      <section class="panel stats">
        <div>
          <div class="panel-header">
            <h2 class="panel-title">全队概览</h2>
            <span id="gameTag" class="tag">实时</span>
          </div>
          <div id="summaryCards" class="summary-cards"></div>
        </div>
        <div>
          <div class="panel-header">
            <h2 class="panel-title">球员数据表</h2>
              <span class="tag">按名单</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>球队/球员</th>
                  <th>得分</th>
                  <th>2分</th>
                  <th>3分</th>
                  <th>罚球</th>
                  <th>前板</th>
                  <th>后板</th>
                  <th>篮板</th>
                  <th>助攻</th>
                  <th>失误</th>
                  <th>抢断</th>
                  <th>盖帽</th>
                </tr>
              </thead>
              <tbody id="statsBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <section id="finalPage" class="summary-page hidden">
      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">球员最终汇总</h2>
          <button id="exportFinalBtn" type="button">导出汇总CSV</button>
        </div>
        <div id="finalTop" class="final-top"></div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h2 class="panel-title">每名球员单项总数</h2>
          <span class="tag">主客队名单</span>
        </div>
        <div class="final-table-wrap">
          <table>
            <thead>
              <tr>
                <th>球队/球员</th>
                <th>得分</th>
                <th>投篮</th>
                <th>2分</th>
                <th>3分</th>
                <th>罚球</th>
                <th>前板</th>
                <th>后板</th>
                <th>篮板</th>
                <th>助攻</th>
                <th>失误</th>
                <th>2+1</th>
                <th>造罚球</th>
                <th>抢断</th>
                <th>盖帽</th>
                <th>效率值</th>
              </tr>
            </thead>
            <tbody id="finalStatsBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const eventLabels = {
      "2M": "2分命中",
      "2A": "2分未中",
      "3M": "3分命中",
      "3A": "3分未中",
      AND1: "2+1",
      DRAW_FOUL: "造成罚球",
      FTM: "罚球命中",
      FTA: "罚球未中",
      OREB: "前场篮板",
      DREB: "后场篮板",
      AST: "助攻",
      TO: "失误",
      STL: "抢断",
      BLK: "盖帽"
    };

    const defaultPlayers = "尹 孙 吴 韩 李 于 段 金 符 周 张 杨 葛".split(" ");
    const liveStorageKey = "basketball-live-tracker";
    const archiveStorageKey = "basketball-game-archive";

    const state = {
      activeTeam: "home",
      selectedPlayer: 1,
      shotMode: "2M",
      currentView: "live",
      rosterOpen: false,
      events: [],
      teams: {
        home: { name: "主队", players: [...defaultPlayers] },
        away: { name: "客队", players: [...defaultPlayers] }
      }
    };

    const els = {
      teamHomeName: document.getElementById("teamHomeName"),
      teamAwayName: document.getElementById("teamAwayName"),
      homeScore: document.getElementById("homeScore"),
      awayScore: document.getElementById("awayScore"),
      period: document.getElementById("period"),
      clock: document.getElementById("clock"),
      activeTeamLabel: document.getElementById("activeTeamLabel"),
      homeToggle: document.getElementById("homeToggle"),
      awayToggle: document.getElementById("awayToggle"),
      players: document.getElementById("players"),
      selectedRecordBtn: document.getElementById("selectedRecordBtn"),
      selectedInfo: document.getElementById("selectedInfo"),
      rosterEditor: document.getElementById("rosterEditor"),
      rosterInput: document.getElementById("rosterInput"),
      applyRosterBtn: document.getElementById("applyRosterBtn"),
      court: document.getElementById("court"),
      courtPeriodInfo: document.getElementById("courtPeriodInfo"),
      periodMapTabs: document.getElementById("periodMapTabs"),
      log: document.getElementById("log"),
      eventCount: document.getElementById("eventCount"),
      summaryCards: document.getElementById("summaryCards"),
      statsBody: document.getElementById("statsBody"),
      livePage: document.getElementById("livePage"),
      finalPage: document.getElementById("finalPage"),
      liveViewBtn: document.getElementById("liveViewBtn"),
      summaryViewBtn: document.getElementById("summaryViewBtn"),
      finalTop: document.getElementById("finalTop"),
      finalStatsBody: document.getElementById("finalStatsBody"),
      exportFinalBtn: document.getElementById("exportFinalBtn"),
      undoBtn: document.getElementById("undoBtn"),
      exportBtn: document.getElementById("exportBtn"),
      saveBtn: document.getElementById("saveBtn"),
      loadBtn: document.getElementById("loadBtn"),
      loadFile: document.getElementById("loadFile"),
      clearBtn: document.getElementById("clearBtn"),
      sampleBtn: document.getElementById("sampleBtn"),
      gameName: document.getElementById("gameName"),
      saveLocalGameBtn: document.getElementById("saveLocalGameBtn"),
      savedGames: document.getElementById("savedGames"),
      loadLocalGameBtn: document.getElementById("loadLocalGameBtn")
    };

    function teamName(team) {
      return state.teams[team].name || (team === "home" ? "主队" : "客队");
    }

    function roster(team) {
      if (!Array.isArray(state.teams[team].players) || state.teams[team].players.length === 0) {
        state.teams[team].players = [...defaultPlayers];
      }
      return state.teams[team].players;
    }

    function playerName(team, player) {
      return roster(team)[player - 1] || "";
    }

    function playerLabel(team, player) {
      const name = playerName(team, player);
      return `${teamName(team)} #${player}${name ? ` ${name}` : ""}`;
    }

    function parseRoster(text) {
      return text
        .split(/[\s,，、]+/)
        .map(name => name.trim())
        .filter(Boolean);
    }

    function buildPlayers() {
      els.players.innerHTML = "";
      roster(state.activeTeam).forEach((name, index) => {
        const i = index + 1;
        const btn = document.createElement("button");
        btn.className = "player-btn";
        btn.type = "button";
        btn.innerHTML = `#${i}<span class="player-name">${name}</span>`;
        btn.dataset.player = String(i);
        btn.addEventListener("click", () => {
          state.selectedPlayer = i;
          render();
        });
        els.players.appendChild(btn);
      });
    }

    function addEvent(type, position) {
      const item = {
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        team: state.activeTeam,
        player: state.selectedPlayer,
        type,
        period: els.period.value,
        clock: els.clock.value.trim() || "00:00",
        at: new Date().toLocaleTimeString("zh-CN", { hour12: false }),
        x: position ? position.x : null,
        y: position ? position.y : null
      };
      state.events.push(item);
      render();
    }

    function makeBlankStats() {
      return {
        pts: 0, twoM: 0, twoA: 0, threeM: 0, threeA: 0, ftM: 0, ftA: 0,
        oreb: 0, dreb: 0, ast: 0, to: 0, and1: 0, drawFoul: 0, stl: 0, blk: 0
      };
    }

    function calculateStats() {
      const stats = { home: {}, away: {} };
      ["home", "away"].forEach(team => {
        const eventMax = state.events
          .filter(event => event.team === team)
          .reduce((max, event) => Math.max(max, Number(event.player) || 0), 0);
        const count = Math.max(roster(team).length, eventMax, 1);
        for (let i = 1; i <= count; i += 1) stats[team][i] = makeBlankStats();
      });

      state.events.forEach(event => {
        if (!stats[event.team]) stats[event.team] = {};
        if (!stats[event.team][event.player]) stats[event.team][event.player] = makeBlankStats();
        const row = stats[event.team][event.player];
        if (event.type === "2M") { row.twoM += 1; row.twoA += 1; row.pts += 2; }
        if (event.type === "2A") row.twoA += 1;
        if (event.type === "3M") { row.threeM += 1; row.threeA += 1; row.pts += 3; }
        if (event.type === "3A") row.threeA += 1;
        if (event.type === "AND1") { row.twoM += 1; row.twoA += 1; row.pts += 2; row.and1 += 1; }
        if (event.type === "DRAW_FOUL") row.drawFoul += 1;
        if (event.type === "FTM") { row.ftM += 1; row.ftA += 1; row.pts += 1; }
        if (event.type === "FTA") row.ftA += 1;
        if (event.type === "OREB") row.oreb += 1;
        if (event.type === "DREB") row.dreb += 1;
        if (event.type === "AST") row.ast += 1;
        if (event.type === "TO") row.to += 1;
        if (event.type === "STL") row.stl += 1;
        if (event.type === "BLK") row.blk += 1;
      });
      return stats;
    }

    function sumTeam(stats, team) {
      return Object.values(stats[team]).reduce((acc, row) => {
        Object.keys(acc).forEach(key => acc[key] += row[key]);
        return acc;
      }, makeBlankStats());
    }

    function pct(made, att) {
      return att ? `${Math.round((made / att) * 100)}%` : "-";
    }

    function shotText(row, madeKey, attKey) {
      return `${row[madeKey]}/${row[attKey]} ${pct(row[madeKey], row[attKey])}`;
    }

    function fieldGoalText(row) {
      const made = row.twoM + row.threeM;
      const attempts = row.twoA + row.threeA;
      return `${made}/${attempts} ${pct(made, attempts)}`;
    }

    function playerEfficiency(row) {
      const misses = (row.twoA - row.twoM) + (row.threeA - row.threeM) + (row.ftA - row.ftM);
      return row.pts + row.oreb + row.dreb + row.ast + row.stl + row.blk + row.and1 + row.drawFoul - misses - row.to;
    }

    function efficiencyCell(value, maxValue) {
      const width = maxValue > 0 ? Math.max(6, Math.round((Math.max(value, 0) / maxValue) * 100)) : 0;
      return `
        <div class="efficiency-box">
          <span class="efficiency-value">${value}</span>
          <span class="efficiency-track">
            <span class="efficiency-bar${value < 0 ? " negative" : ""}" style="--eff-width:${value < 0 ? 20 : width}%"></span>
          </span>
        </div>
      `;
    }

    function getPlayerRows(stats) {
      const rows = [];
      ["home", "away"].forEach(team => {
        const count = Math.max(roster(team).length, ...Object.keys(stats[team]).map(Number));
        for (let i = 1; i <= count; i += 1) {
          const row = stats[team][i];
          if (!row) continue;
          const hasData = Object.values(row).some(Boolean);
          rows.push({
            team,
            player: i,
            row,
            hasData,
            efficiency: playerEfficiency(row)
          });
        }
      });
      return rows;
    }

    function updateScores(stats) {
      els.homeScore.textContent = sumTeam(stats, "home").pts;
      els.awayScore.textContent = sumTeam(stats, "away").pts;
    }

    function renderPlayers() {
      const currentRoster = roster(state.activeTeam);
      if (state.selectedPlayer > currentRoster.length) state.selectedPlayer = Math.max(1, currentRoster.length);
      buildPlayers();
      document.querySelectorAll(".player-btn").forEach(btn => {
        btn.classList.toggle("active", Number(btn.dataset.player) === state.selectedPlayer);
      });
      els.homeToggle.classList.toggle("active", state.activeTeam === "home");
      els.awayToggle.classList.toggle("active", state.activeTeam === "away");
      els.activeTeamLabel.textContent = teamName(state.activeTeam);
      els.selectedInfo.textContent = playerLabel(state.activeTeam, state.selectedPlayer);
      els.rosterEditor.classList.toggle("hidden", !state.rosterOpen);
      if (document.activeElement !== els.rosterInput) {
        els.rosterInput.value = currentRoster.join(" ");
      }
    }

    function renderCourt() {
      els.court.querySelectorAll(".shot-dot").forEach(dot => dot.remove());
      const currentPeriod = els.period.value;
      const currentShots = state.events
        .filter(event => event.team === state.activeTeam && event.period === currentPeriod && ["2M", "2A", "3M", "3A", "AND1", "DRAW_FOUL"].includes(event.type) && event.x !== null);

      currentShots.forEach(event => {
          const dot = document.createElement("div");
          const dotType = event.type === "AND1" ? "and-one" : event.type === "DRAW_FOUL" ? "draw-foul" : event.type.endsWith("M") ? "make" : "miss";
          dot.className = `shot-dot ${dotType}`;
          dot.style.left = `${event.x}%`;
          dot.style.top = `${event.y}%`;
          dot.textContent = playerName(event.team, event.player) || event.player;
          dot.title = `${playerLabel(event.team, event.player)} ${eventLabels[event.type]}`;
          els.court.appendChild(dot);
        });
      els.courtPeriodInfo.innerHTML = `<b>${teamName(state.activeTeam)}投篮图：</b>${currentPeriod} · ${currentShots.length}次标记`;
    }

    function renderPeriodMapTabs() {
      const periods = Array.from(els.period.options).map(option => option.value || option.textContent);
      els.periodMapTabs.innerHTML = periods.map(period => {
        const shots = state.events.filter(event => event.team === state.activeTeam && event.period === period && ["2M", "2A", "3M", "3A", "AND1", "DRAW_FOUL"].includes(event.type)).length;
        const active = period === els.period.value ? " active" : "";
        return `<button class="period-map-btn${active}" data-period-map="${period}" type="button">${period} ${shots}</button>`;
      }).join("");
      els.periodMapTabs.querySelectorAll(".period-map-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          els.period.value = btn.dataset.periodMap;
          render();
        });
      });
    }

    function renderLog() {
      els.eventCount.textContent = `${state.events.length}条`;
      els.log.innerHTML = "";
      [...state.events].reverse().forEach(event => {
        const row = document.createElement("div");
        row.className = "log-item";
        row.innerHTML = `
          <div class="log-time">${event.period} ${event.clock}</div>
          <div class="log-main">${playerLabel(event.team, event.player)} ${eventLabels[event.type]}</div>
          <div class="tag">${event.at}</div>
        `;
        els.log.appendChild(row);
      });
    }

    function renderSummary(stats) {
      const home = sumTeam(stats, "home");
      const away = sumTeam(stats, "away");
      const total = {
        shots: home.twoA + home.threeA + away.twoA + away.threeA,
        turnovers: home.to + away.to,
        oreb: home.oreb + away.oreb,
        dreb: home.dreb + away.dreb
      };
      const cards = [
        ["总投篮", `${total.shots}`],
        ["总失误", `${total.turnovers}`],
        ["前场篮板", `${total.oreb}`],
        ["后场篮板", `${total.dreb}`]
      ];
      els.summaryCards.innerHTML = cards.map(([label, value]) => `
        <div class="metric"><span>${label}</span><strong>${value}</strong></div>
      `).join("");
    }

    function renderStats(stats) {
      const rows = [];
      ["home", "away"].forEach(team => {
        const count = Math.max(roster(team).length, ...Object.keys(stats[team]).map(Number));
        for (let i = 1; i <= count; i += 1) {
          const row = stats[team][i];
          if (!row) continue;
          const hasData = Object.values(row).some(Boolean);
          rows.push(`
            <tr${hasData ? "" : " style=\"color:#8a98a7\""}>
              <td>${playerLabel(team, i)}</td>
              <td>${row.pts}</td>
              <td>${shotText(row, "twoM", "twoA")}</td>
              <td>${shotText(row, "threeM", "threeA")}</td>
              <td>${shotText(row, "ftM", "ftA")}</td>
              <td>${row.oreb}</td>
              <td>${row.dreb}</td>
              <td>${row.oreb + row.dreb}</td>
              <td>${row.ast}</td>
              <td>${row.to}</td>
              <td>${row.and1}</td>
              <td>${row.drawFoul}</td>
              <td>${row.stl}</td>
              <td>${row.blk}</td>
            </tr>
          `);
        }
      });
      els.statsBody.innerHTML = rows.join("");
    }

    function renderFinalStats(stats) {
      const home = sumTeam(stats, "home");
      const away = sumTeam(stats, "away");
      const totalReb = home.oreb + home.dreb + away.oreb + away.dreb;
      const totalAst = home.ast + away.ast;
      const totalTo = home.to + away.to;
      const totalPts = home.pts + away.pts;
      const playerRows = getPlayerRows(stats);
      const activePlayers = playerRows
        .filter(item => item.hasData)
        .sort((a, b) => b.efficiency - a.efficiency || b.row.pts - a.row.pts || a.player - b.player);
      const maxEfficiency = Math.max(0, ...activePlayers.map(item => item.efficiency));
      const leaders = activePlayers.slice(0, 3);

      const cards = [
        ["总得分", `${totalPts}`],
        ["总篮板", `${totalReb}`],
        ["总助攻", `${totalAst}`],
        ["效率榜", leaders.length ? leaders.map((item, index) => `${index + 1}. ${playerLabel(item.team, item.player)} ${item.efficiency}`).join(" / ") : "暂无"]
      ];
      els.finalTop.innerHTML = cards.map(([label, value]) => `
        <div class="metric${label === "效率榜" ? " leader" : ""}"><span>${label}</span><strong>${value}</strong></div>
      `).join("");

      const rows = [];
      ["home", "away"].forEach(team => {
        const teamRow = sumTeam(stats, team);
        rows.push(`
          <tr class="final-team-row">
            <td>${teamName(team)} 合计</td>
            <td>${teamRow.pts}</td>
            <td>${fieldGoalText(teamRow)}</td>
            <td>${shotText(teamRow, "twoM", "twoA")}</td>
            <td>${shotText(teamRow, "threeM", "threeA")}</td>
            <td>${shotText(teamRow, "ftM", "ftA")}</td>
            <td>${teamRow.oreb}</td>
            <td>${teamRow.dreb}</td>
            <td>${teamRow.oreb + teamRow.dreb}</td>
            <td>${teamRow.ast}</td>
            <td>${teamRow.to}</td>
            <td>${teamRow.and1}</td>
            <td>${teamRow.drawFoul}</td>
            <td>${teamRow.stl}</td>
            <td>${teamRow.blk}</td>
            <td class="efficiency-cell">${efficiencyCell(playerEfficiency(teamRow), maxEfficiency)}</td>
          </tr>
        `);

        const teamPlayers = playerRows
          .filter(item => item.team === team)
          .sort((a, b) => Number(b.hasData) - Number(a.hasData) || b.efficiency - a.efficiency || b.row.pts - a.row.pts || a.player - b.player);

        teamPlayers.forEach(item => {
          const row = item.row;
          const rank = activePlayers.findIndex(active => active.team === item.team && active.player === item.player) + 1;
          const rankText = item.hasData ? `第${rank}` : "-";
          const rankClass = rank > 0 && rank <= 3 ? "rank-badge top" : "rank-badge";
          rows.push(`
            <tr class="final-player-row${item.hasData ? " has-data" : ""}"${item.hasData ? "" : " style=\"color:#8a98a7\""}>
              <td><span class="${rankClass}">${rankText}</span>${playerLabel(team, item.player)}</td>
              <td>${row.pts}</td>
              <td>${fieldGoalText(row)}</td>
              <td>${shotText(row, "twoM", "twoA")}</td>
              <td>${shotText(row, "threeM", "threeA")}</td>
              <td>${shotText(row, "ftM", "ftA")}</td>
              <td>${row.oreb}</td>
              <td>${row.dreb}</td>
              <td>${row.oreb + row.dreb}</td>
              <td>${row.ast}</td>
              <td>${row.to}</td>
              <td>${row.and1}</td>
              <td>${row.drawFoul}</td>
              <td>${row.stl}</td>
              <td>${row.blk}</td>
              <td class="efficiency-cell">${efficiencyCell(item.efficiency, maxEfficiency)}</td>
            </tr>
          `);
        });
      });
      els.finalStatsBody.innerHTML = rows.join("");
    }

    function renderShotMode() {
      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.dataset.active = String(btn.dataset.shot === state.shotMode);
      });
    }

    function renderView() {
      const isSummary = state.currentView === "summary";
      els.livePage.classList.toggle("hidden", isSummary);
      els.finalPage.classList.toggle("hidden", !isSummary);
      els.liveViewBtn.classList.toggle("active", !isSummary);
      els.summaryViewBtn.classList.toggle("active", isSummary);
    }

    function getGameData() {
      return {
        teams: state.teams,
        events: state.events,
        period: els.period.value,
        clock: els.clock.value,
        gameName: els.gameName.value.trim() || "未命名比赛",
        savedAt: new Date().toISOString()
      };
    }

    function normalizeTeams(teams) {
      const normalized = {
        home: { name: teams?.home?.name || "主队", players: teams?.home?.players || [...defaultPlayers] },
        away: { name: teams?.away?.name || "客队", players: teams?.away?.players || [...defaultPlayers] }
      };
      ["home", "away"].forEach(team => {
        normalized[team].players = Array.isArray(normalized[team].players)
          ? normalized[team].players.map(name => String(name).trim()).filter(Boolean)
          : [...defaultPlayers];
        if (normalized[team].players.length === 0) normalized[team].players = [...defaultPlayers];
      });
      return normalized;
    }

    function getArchive() {
      try {
        const data = JSON.parse(localStorage.getItem(archiveStorageKey) || "[]");
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function setArchive(data) {
      localStorage.setItem(archiveStorageKey, JSON.stringify(data));
      renderSavedGames();
    }

    function renderSavedGames() {
      const archive = getArchive();
      const selected = els.savedGames.value;
      els.savedGames.innerHTML = archive.length
        ? archive.map(game => `<option value="${game.id}">${game.name} · ${new Date(game.savedAt).toLocaleString("zh-CN", { hour12: false })}</option>`).join("")
        : `<option value="">暂无本地比赛</option>`;
      if (selected && archive.some(game => game.id === selected)) els.savedGames.value = selected;
    }

    function render() {
      state.teams.home.name = els.teamHomeName.value.trim() || "主队";
      state.teams.away.name = els.teamAwayName.value.trim() || "客队";
      const stats = calculateStats();
      updateScores(stats);
      renderPlayers();
      renderShotMode();
      renderCourt();
      renderPeriodMapTabs();
      renderLog();
      renderSummary(stats);
      renderStats(stats);
      renderFinalStats(stats);
      renderView();
      renderSavedGames();
      localStorage.setItem(liveStorageKey, JSON.stringify(getGameData()));
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function exportCsv() {
      const header = ["节次", "时间", "球队", "球员编号", "球员姓名", "事件", "球场X%", "球场Y%", "记录时间"];
      const body = state.events.map(event => [
        event.period, event.clock, teamName(event.team), `#${event.player}`, playerName(event.team, event.player), eventLabels[event.type],
        event.x ?? "", event.y ?? "", event.at
      ]);
      const csv = [header, ...body]
        .map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(","))
        .join("\n");
      download(`篮球临场记录-${new Date().toISOString().slice(0, 10)}.csv`, "\ufeff" + csv, "text/csv;charset=utf-8");
    }

    function exportFinalCsv() {
      const stats = calculateStats();
      const header = ["球队", "球员编号", "球员姓名", "得分", "投篮", "2分", "3分", "罚球", "前板", "后板", "篮板", "助攻", "失误", "2+1", "造罚球", "抢断", "盖帽", "效率"];
      const body = [];
      ["home", "away"].forEach(team => {
        const count = Math.max(roster(team).length, ...Object.keys(stats[team]).map(Number));
        for (let i = 1; i <= count; i += 1) {
          const row = stats[team][i];
          if (!row) continue;
          body.push([
            teamName(team),
            `#${i}`,
            playerName(team, i),
            row.pts,
            fieldGoalText(row),
            shotText(row, "twoM", "twoA"),
            shotText(row, "threeM", "threeA"),
            shotText(row, "ftM", "ftA"),
            row.oreb,
            row.dreb,
            row.oreb + row.dreb,
            row.ast,
            row.to,
            row.and1,
            row.drawFoul,
            row.stl,
            row.blk,
            playerEfficiency(row)
          ]);
        }
      });
      const csv = [header, ...body]
        .map(row => row.map(cell => `"${String(cell).replaceAll('"', '""')}"`).join(","))
        .join("\n");
      download(`篮球球员最终汇总-${new Date().toISOString().slice(0, 10)}.csv`, "\ufeff" + csv, "text/csv;charset=utf-8");
    }

    function saveJson() {
      const data = getGameData();
      download(`篮球临场记录-${new Date().toISOString().slice(0, 10)}.json`, JSON.stringify(data, null, 2), "application/json");
    }

    function loadData(data) {
      state.teams = normalizeTeams(data.teams);
      state.events = Array.isArray(data.events) ? data.events : [];
      els.teamHomeName.value = state.teams.home?.name || "主队";
      els.teamAwayName.value = state.teams.away?.name || "客队";
      els.period.value = data.period || "第1节";
      els.clock.value = data.clock || "10:00";
      els.gameName.value = data.gameName || "比赛1";
      state.selectedPlayer = Math.min(state.selectedPlayer, roster(state.activeTeam).length);
      render();
    }

    function loadLocal() {
      const saved = localStorage.getItem(liveStorageKey);
      if (!saved) return;
      try {
        loadData(JSON.parse(saved));
      } catch {
        localStorage.removeItem(liveStorageKey);
      }
    }

    function saveLocalGame() {
      const archive = getArchive();
      const name = els.gameName.value.trim() || `比赛${archive.length + 1}`;
      const data = getGameData();
      const existingIndex = archive.findIndex(game => game.name === name);
      const item = {
        id: existingIndex >= 0 ? archive[existingIndex].id : `${Date.now()}-${Math.random()}`,
        name,
        savedAt: new Date().toISOString(),
        data: { ...data, gameName: name }
      };
      if (existingIndex >= 0) archive[existingIndex] = item;
      else archive.unshift(item);
      setArchive(archive);
      els.savedGames.value = item.id;
      els.gameName.value = name;
    }

    function loadLocalGame() {
      const id = els.savedGames.value;
      const game = getArchive().find(item => item.id === id);
      if (!game) return;
      loadData(game.data);
    }

    function addSample() {
      const sample = [
        ["home", 1, "2M", 18, 52], ["home", 4, "3A", 35, 22], ["away", 7, "DREB"],
        ["away", 7, "TO"], ["home", 9, "OREB"], ["home", 9, "2M", 12, 45],
        ["away", 3, "3M", 82, 30], ["home", 1, "AST"], ["away", 11, "FTM"]
      ];
      sample.forEach(([team, player, type, x, y]) => {
        state.events.push({
          id: `${Date.now()}-${Math.random()}`,
          team, player, type,
          period: els.period.value,
          clock: els.clock.value,
          at: new Date().toLocaleTimeString("zh-CN", { hour12: false }),
          x: x ?? null,
          y: y ?? null
        });
      });
      render();
    }

    els.homeToggle.addEventListener("click", () => {
      state.activeTeam = "home";
      state.selectedPlayer = Math.min(state.selectedPlayer, roster("home").length);
      render();
    });

    els.awayToggle.addEventListener("click", () => {
      state.activeTeam = "away";
      state.selectedPlayer = Math.min(state.selectedPlayer, roster("away").length);
      render();
    });

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        state.shotMode = btn.dataset.shot;
        render();
      });
    });

    els.court.addEventListener("click", event => {
      const rect = els.court.getBoundingClientRect();
      const x = Number((((event.clientX - rect.left) / rect.width) * 100).toFixed(2));
      const y = Number((((event.clientY - rect.top) / rect.height) * 100).toFixed(2));
      addEvent(state.shotMode, { x, y });
    });

    document.querySelectorAll(".event-btn").forEach(btn => {
      btn.addEventListener("click", () => addEvent(btn.dataset.event));
    });

    els.undoBtn.addEventListener("click", () => {
      state.events.pop();
      render();
    });

    els.clearBtn.addEventListener("click", () => {
      if (confirm("确定清空本场全部记录？")) {
        state.events = [];
        render();
      }
    });

    els.exportBtn.addEventListener("click", exportCsv);
    els.exportFinalBtn.addEventListener("click", exportFinalCsv);
    els.saveBtn.addEventListener("click", saveJson);
    els.loadBtn.addEventListener("click", () => els.loadFile.click());
    els.sampleBtn.addEventListener("click", addSample);
    els.selectedRecordBtn.addEventListener("click", () => {
      state.rosterOpen = !state.rosterOpen;
      render();
    });
    els.applyRosterBtn.addEventListener("click", () => {
      const names = parseRoster(els.rosterInput.value);
      if (names.length === 0) {
        alert("请至少输入一名球员。");
        return;
      }
      state.teams[state.activeTeam].players = names;
      state.selectedPlayer = Math.min(state.selectedPlayer, names.length);
      state.rosterOpen = false;
      render();
    });
    els.saveLocalGameBtn.addEventListener("click", saveLocalGame);
    els.loadLocalGameBtn.addEventListener("click", loadLocalGame);
    els.liveViewBtn.addEventListener("click", () => {
      state.currentView = "live";
      render();
    });
    els.summaryViewBtn.addEventListener("click", () => {
      state.currentView = "summary";
      render();
    });
    els.teamHomeName.addEventListener("input", render);
    els.teamAwayName.addEventListener("input", render);
    els.period.addEventListener("change", render);
    els.clock.addEventListener("input", render);

    els.loadFile.addEventListener("change", () => {
      const file = els.loadFile.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          loadData(JSON.parse(reader.result));
        } catch {
          alert("读取失败，请选择平台保存的 JSON 文件。");
        }
      };
      reader.readAsText(file);
      els.loadFile.value = "";
    });

    buildPlayers();
    loadLocal();
    render();
  </script>
</body>
</html>
